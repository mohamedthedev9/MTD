<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiation // 48 Hours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="countdown.css">
</head>
<body>

    <main class="countdown-wrapper">
        <div class="status-text">System Initiation In</div>
        
        <div class="timer-container">
            <div class="time-block">
                <span id="hours" class="time-value">48</span>
                <span class="time-label">Hours</span>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-block">
                <span id="minutes" class="time-value">00</span>
                <span class="time-label">Minutes</span>
            </div>
            
            <div class="separator">:</div>
            
            <div class="time-block">
                <span id="seconds" class="time-value">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>
    </main>

    <script src="countdown.js"></script>
</body>
</html>
